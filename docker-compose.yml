services:
  app:
    build: .
    container_name: teams-app
    ports:
      - "5000:5000"
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    networks:
      - teams-network

  worker:
    build: .
    container_name: teams-worker
    command: celery -A tasks worker --concurrency=2 --loglevel=info
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
      app:
        condition: service_healthy
    restart: always
    networks:
      - teams-network

  redis:
    image: redis:7-alpine
    container_name: teams-redis
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - teams-network

volumes:
  redis_data:

networks:
  teams-network:
    driver: bridge
